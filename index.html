<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drogas UTI/PS — Calculadora</title>
<meta name="description" content="Calculadora automática de drogas para CTI, Pronto-Socorro e Anestesia.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="app-header">
    <div class="header-top">
      <button id="btn-drawer-toggle" class="btn-drawer-toggle" aria-label="Abrir navegação" title="Navegar por seções">
        <span class="hamburger-icon">
          <span></span><span></span><span></span>
        </span>
      </button>
      <div class="header-title">
        <span class="header-mark">Rx</span>
        <h1>Drogas <span>UTI/PS</span></h1>
      </div>
      <div class="header-top__right">
        <div class="institution-selector">
          <label for="select-institution">Instituição</label>
          <select id="select-institution"></select>
        </div>
        <button id="btn-reset" class="btn btn--ghost btn--compact">+ Novo</button>
      </div>
    </div>

    <!-- Slide-out drawer: bookmark navigation -->
    <div id="drawer-overlay" class="drawer-overlay"></div>
    <aside id="drawer" class="drawer" aria-label="Navegação por seções">
      <div class="drawer-header">
        <span class="drawer-title">Navegar</span>
        <button id="btn-drawer-close" class="drawer-close" aria-label="Fechar navegação">✕</button>
      </div>
      <nav id="drawer-nav" class="drawer-nav"></nav>
    </aside>

    <div class="header-patient">
      <!-- Peso -->
      <div class="hp-group">
        <label class="hp-label" for="input-weight">Peso</label>
        <div class="stepper stepper--s">
          <button data-stepper="-1" data-target="input-weight" aria-label="Diminuir peso">−</button>
          <input type="number" id="input-weight" min="0" step="1" inputmode="decimal" class="input--s">
          <button data-stepper="1" data-target="input-weight" aria-label="Aumentar peso">+</button>
        </div>
        <div class="presets presets--s">
          <button data-preset-weight="60">60</button>
          <button data-preset-weight="70">70</button>
          <button data-preset-weight="80">80</button>
          <button data-preset-weight="90">90</button>
          <button data-preset-weight="100">100</button>
        </div>
      </div>

      <!-- Altura -->
      <div class="hp-group">
        <label class="hp-label" for="input-height">Alt</label>
        <div class="stepper stepper--s">
          <button data-stepper="-1" data-target="input-height" aria-label="Diminuir altura">−</button>
          <input type="number" id="input-height" min="0" step="1" inputmode="decimal" class="input--s">
          <button data-stepper="1" data-target="input-height" aria-label="Aumentar altura">+</button>
        </div>
      </div>

      <!-- Sexo -->
      <div class="hp-group hp-group--sex">
        <label class="hp-label">Sexo</label>
        <div class="sex-toggle sex-toggle--s">
          <button data-sex="male">♂&thinsp;M</button>
          <button data-sex="female">♀&thinsp;F</button>
        </div>
      </div>

      <!-- Idade -->
      <div class="hp-group">
        <label class="hp-label">Idade</label>
        <div class="age-inputs age-inputs--s">
          <input type="number" id="input-age-years" min="0" placeholder="anos" class="input--s">
          <input type="number" id="input-age-months" min="0" max="11" placeholder="mes" class="input--s">
        </div>
      </div>

      <!-- Nome -->
      <div class="hp-group hp-group--name">
        <label class="hp-label" for="input-name">Nome</label>
        <input type="text" id="input-name" placeholder="opcional" autocomplete="off" class="input--s input--wide">
      </div>

      <!-- DN -->
      <div class="hp-group hp-group--dob">
        <label class="hp-label" for="input-dob">DN</label>
        <input type="text" id="input-dob" placeholder="dd/mm/aaaa" inputmode="numeric" class="input--s input--date">
      </div>
    </div>
  </header>

  <div id="vm-strip" class="vm-strip vm-strip--empty"></div>

  <main id="app-main">
    <section id="drug-panel">
      <div id="print-toolbar">
        <span id="selected-count">0 selecionadas</span>
        <div class="print-toolbar__actions">
          <button id="btn-print-selected" class="btn btn--outline" disabled>Imprimir Selecionadas</button>
          <button id="btn-print-all" class="btn btn--primary">Imprimir Tudo</button>
        </div>
      </div>
      <nav id="category-jump" aria-label="Navegar por categoria"></nav>
      <div id="drug-list"></div>
    </section>
  </main>

  <div id="print-sheet" aria-hidden="true"></div>

  <script src="js/database.js"></script>
  <script src="js/calculations.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/render.js"></script>
  <script src="js/print.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
